name: Publish npm package

on:
  # Publish when a version tag is pushed, for example v0.1.3
  push:
    tags:
      - 'v*'

# Grant the permissions needed to mint an OIDC token for npm trusted publishing
permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      # Check out the repository
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Setup Node.js
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
          cache: npm

      # Install dependencies so the package is published from a clean environment
      - name: Install dependencies
        run: npm ci

      # Ensure the pushed tag matches the version declared in package.json
      - name: Validate tag version
        run: |
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$PACKAGE_VERSION" != "$TAG_VERSION" ]; then
            echo "Tag version ($TAG_VERSION) does not match package.json version ($PACKAGE_VERSION)."
            exit 1
          fi

      # Publish to npm through trusted publishing using the GitHub OIDC identity
      - name: Publish to npm
        run: npm publish --access public --provenance