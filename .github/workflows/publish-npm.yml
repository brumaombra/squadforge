name: Publish npm package

on:
  # Manual trigger via GitHub UI
  workflow_dispatch:
    inputs:
      bump:
        description: Version bump
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
        default: patch

# Grant the permissions needed to push the release commit/tag and mint an OIDC token for npm trusted publishing
permissions:
  contents: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      # Check out the repository
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Setup Node.js
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      # Install dependencies
      - name: Install dependencies
        run: npm ci

      # Bump version
      - name: Bump version
        run: |
          npm version "${{ inputs.bump }}" -m "chore(release): %s [skip ci]"

      # Capture the version for release creation
      - name: Capture version
        id: version
        run: echo "version=$(node -p \"require('./package.json').version\")" >> "$GITHUB_OUTPUT"

      # Publish to npm through trusted publishing using the GitHub OIDC identity
      - name: Publish to npm
        run: npm publish --access public --provenance

      # Push changes back to the repository
      - name: Push commit and tags
        run: git push origin HEAD:${{ github.ref_name }} --follow-tags

      # Create a GitHub Release from the version tag
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}